# nginx config for the Dream Vacation App single-page React frontend.
server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Gzip static assets for faster delivery.
    gzip            on;
    gzip_types      text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Proxy API calls to the backend container over the internal Docker network.
    # Using Docker's embedded DNS (127.0.0.11) + a variable defers upstream
    # resolution to request time, so nginx starts even if backend isn't up yet.
    location /api/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $backend_upstream http://backend:3001;
        proxy_pass $backend_upstream$request_uri;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA routing: serve index.html for any path the build doesn't have a file for.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-lived caching for fingerprinted static assets.
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
