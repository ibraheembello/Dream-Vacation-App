# nginx config for the Dream Vacation App single-page React frontend.
server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Gzip static assets for faster delivery.
    gzip            on;
    gzip_types      text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # SPA routing: serve index.html for any path the build doesn't have a file for.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-lived caching for fingerprinted static assets.
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
