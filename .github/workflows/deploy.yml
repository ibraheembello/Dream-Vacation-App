name: Deploy to EC2

# The final CD stage: on every push to main, (re)build & push both images to
# GHCR pinned to the commit SHA, then SSH into the EC2 box and roll out the
# stack with docker-compose.prod.yml. Also runnable on demand.
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/ibraheembello/dream-vacation-app-backend
  FRONTEND_IMAGE: ghcr.io/ibraheembello/dream-vacation-app-frontend

jobs:
  # ---------- Build & push both images tagged with the commit SHA ----------
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------- SSH into EC2 and roll out the new images ----------
  deploy:
    name: Deploy to EC2 over SSH
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Copy deployment files to EC2
        run: |
          scp -i ~/.ssh/id_rsa docker-compose.prod.yml ubuntu@${{ secrets.EC2_HOST }}:/home/ubuntu/app/
          scp -i ~/.ssh/id_rsa deploy/remote-deploy.sh   ubuntu@${{ secrets.EC2_HOST }}:/home/ubuntu/app/
          scp -i ~/.ssh/id_rsa -r db                     ubuntu@${{ secrets.EC2_HOST }}:/home/ubuntu/app/

      - name: Roll out on EC2
        run: |
          ssh -i ~/.ssh/id_rsa ubuntu@${{ secrets.EC2_HOST }} \
            "POSTGRES_PASSWORD='${{ secrets.POSTGRES_PASSWORD }}' \
             GHCR_USER='${{ github.actor }}' \
             GHCR_TOKEN='${{ secrets.GITHUB_TOKEN }}' \
             IMAGE_TAG='sha-${{ github.sha }}' \
             bash /home/ubuntu/app/remote-deploy.sh"

      - name: Smoke-test the public endpoint
        run: |
          echo "Waiting for the app to answer on http://${{ secrets.EC2_HOST }}/ ..."
          for i in $(seq 1 20); do
            code=$(curl -s -o /dev/null -w '%{http_code}' "http://${{ secrets.EC2_HOST }}/" || true)
            echo "  attempt $i -> HTTP $code"
            if [ "$code" = "200" ]; then echo "App is live ✅"; exit 0; fi
            sleep 6
          done
          echo "App did not return 200 in time"; exit 1
