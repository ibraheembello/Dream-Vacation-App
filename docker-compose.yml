# ============================================================================
# Dream Vacation App — full stack orchestration
# Services: frontend (nginx) | backend (node/express) | db (postgres)
# All three sit on ONE custom bridge network and talk via service names.
# Run with:  docker compose up --build
# ============================================================================

services:
  # --------------------------------------------------------------------------
  # PostgreSQL database
  # --------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: dvapp-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      # Named volume -> data survives `docker compose down` & restarts.
      - db-data:/var/lib/postgresql/data
      # Schema bootstrap: runs once when the data dir is empty.
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - dvapp-net
    healthcheck:
      # Backend waits until this passes (see depends_on below).
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      # First boot creates the DB + runs init.sql, then restarts postgres.
      # start_period gives that one-time bootstrap room so it isn't counted
      # as failing health checks (prevents a cold-start race on slow disks).
      start_period: 60s

  # --------------------------------------------------------------------------
  # Node.js / Express API
  # --------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
    container_name: dvapp-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Reach the DB by its SERVICE NAME (db) over the internal network.
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      PORT: ${BACKEND_PORT}
      COUNTRIES_API_BASE_URL: ${COUNTRIES_API_BASE_URL}
    ports:
      # Published so the browser (on the host) can call the API directly.
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dvapp-net

  # --------------------------------------------------------------------------
  # React frontend (built to static files, served by nginx)
  # --------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      args:
        # Baked into the bundle at build time (CRA requirement).
        REACT_APP_API_URL: ${REACT_APP_API_URL}
    container_name: dvapp-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - backend
    networks:
      - dvapp-net

# ----------------------------------------------------------------------------
# Custom bridge network — isolates the stack & enables service-name DNS.
# ----------------------------------------------------------------------------
networks:
  dvapp-net:
    driver: bridge

# ----------------------------------------------------------------------------
# Named volume for database persistence.
# ----------------------------------------------------------------------------
volumes:
  db-data:
    driver: local
